<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<title>GTA 2D — Open World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hud-top{position:absolute;top:15px;right:20px;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
#wanted{font-size:28px;letter-spacing:4px;filter:drop-shadow(0 0 6px rgba(255,200,0,.8))}
#money{color:#4f4;font-size:22px;font-weight:bold;text-shadow:1px 1px 3px #000}
#health-bar-bg{width:200px;height:14px;background:rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.3);border-radius:7px;overflow:hidden}
#health-bar{height:100%;width:100%;background:linear-gradient(90deg,#e33,#f66);border-radius:5px;transition:width .3s}
#armor-bar-bg{width:200px;height:10px;background:rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.2);border-radius:5px;overflow:hidden}
#armor-bar{height:100%;width:0%;background:linear-gradient(90deg,#48f,#6af);border-radius:3px;transition:width .3s}
#weapon-info{color:#fff;font-size:16px;text-shadow:1px 1px 2px #000;margin-top:4px}
#minimap-container{position:absolute;bottom:20px;left:20px;width:180px;height:180px;border:3px solid rgba(255,255,255,.4);border-radius:8px;overflow:hidden;background:rgba(0,0,0,.5)}
#minimap{width:100%;height:100%}
#info-panel{position:absolute;bottom:20px;right:20px;color:#fff;font-size:14px;text-align:right;text-shadow:1px 1px 2px #000;line-height:1.6}
#speed-display{position:absolute;bottom:60px;right:20px;color:#ff0;font-size:20px;font-weight:bold;text-shadow:1px 1px 3px #000;display:none}
#message{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:36px;font-weight:bold;text-shadow:2px 2px 8px #000;opacity:0;transition:opacity .5s;text-align:center;max-width:80%}
#controls-hint{position:absolute;top:15px;left:20px;color:rgba(255,255,255,.7);font-size:13px;text-shadow:1px 1px 2px #000;line-height:1.8}
#mission-text{position:absolute;top:80px;left:50%;transform:translateX(-50%);color:#ff0;font-size:18px;font-weight:bold;text-shadow:1px 1px 4px #000;opacity:0;transition:opacity .5s;text-align:center;max-width:600px}
#clock{position:absolute;top:18px;left:50%;transform:translateX(-50%);color:#fff;font-size:16px;font-weight:bold;text-shadow:1px 1px 3px #000;background:rgba(0,0,0,.4);padding:4px 12px;border-radius:6px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="controls-hint">
    <b>WASD</b> движение · <b>F</b> авто · <b>SPACE</b> тормоз<br>
    <b>ЛКМ</b> стрелять · <b>1-5</b> оружие · <b>SHIFT</b> бег/нитро<br>
    <b>E</b> подобрать/войти · <b>M</b> карта · <b>F3</b> FPS · <b>ESC</b> пауза<br>
    <i>карта M: ЛКМ‑двигать · ПКМ‑крутить/зум · колесо‑зум · R‑сброс</i>
  </div>
  <div id="clock">06:00</div>
  <div id="hud-top">
    <div id="wanted"></div>
    <div id="money">$0</div>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
    <div id="armor-bar-bg"><div id="armor-bar"></div></div>
    <div id="weapon-info">🔫 Пистолет ∞</div>
  </div>
  <div id="minimap-container"><canvas id="minimap" width="180" height="180"></canvas></div>
  <div id="speed-display">0 км/ч</div>
  <div id="info-panel"></div>
  <div id="message"></div>
  <div id="mission-text"></div>
</div>
<script src="consts.js"></script>
<script src="1scene.js"></script>
<script src="2scene.js"></script>
<script src="3scene.js"></script>
<script src="worldExtras.js"></script>
<script src="Weapon.js"></script>
<script src="clothesplayer.js"></script>
<script src="home.js"></script>
<script src="hospital.js"></script>
<script src="policeStation.js"></script>
<script src="wildIsland.js"></script>
<script src="engine.js"></script>
<script src="respawnFix.js"></script>
<script src="nameFix.js"></script>
<script src="phone.js"></script>
<script src="5scene.js"></script>
  
<script>setTimeout(function(){if(typeof gameLoop==='undefined'){var d=document.getElementById('message');d.style.opacity=1;d.style.color='#f66';d.style.fontSize='16px';d.textContent='⚠️ engine.js загрузился НЕ целиком (обрезался). Открой engine.js на GitHub кнопкой Copy и вставь заново — последняя строка должна быть: // ====== engine.js КОНЕЦ ======';}},2000);</script>
</body>
</html>
